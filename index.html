<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIIE PRO | New Order</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #050505; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-btn { background: linear-gradient(to right, #22d3ee, #2563eb); }
    </style>
</head>
<body class="min-h-screen p-4">

    <div class="max-w-md mx-auto mt-10 text-center">
        <h1 class="text-4xl font-black italic tracking-tighter uppercase">VIIE<span class="text-cyan-400">PRO</span></h1>
        <p class="text-slate-500 text-[10px] mt-2 uppercase font-black tracking-widest">Hello, Admin_Viie</p>
    </div>

    <div class="max-w-md mx-auto mt-8 glass p-6 rounded-[32px] flex items-center gap-5">
        <div class="bg-cyan-400/10 p-4 rounded-2xl text-cyan-400 text-2xl">
            <i class="fa-solid fa-wallet"></i>
        </div>
        <div>
            <p class="text-[9px] text-slate-500 uppercase font-black tracking-widest">Your Funds</p>
            <h3 class="text-3xl font-black tracking-tighter">₹1,00,000.00</h3>
        </div>
    </div>

    <div class="max-w-md mx-auto mt-6 glass p-8 rounded-[40px] shadow-2xl">
        <h2 class="text-2xl font-black mb-8 uppercase flex items-center gap-3 tracking-tighter">
            <i class="fa-solid fa-bolt text-yellow-400"></i> New Boost
        </h2>

        <div class="space-y-6">
            <div>
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Category</label>
                <select class="w-full bg-black/50 border border-white/10 p-4 rounded-2xl outline-none text-sm mt-2">
                    <option>Choose Service Type</option>
                    <option>Instagram Followers</option>
                </select>
            </div>

            <div>
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Instagram URL / ID</label>
                <input type="text" placeholder="Paste link here..." class="w-full bg-black/50 border border-white/10 p-4 rounded-2xl outline-none text-sm mt-2">
            </div>

            <button class="w-full gradient-btn py-5 rounded-3xl text-black font-black uppercase tracking-widest mt-4 shadow-lg active:scale-95 transition">
                Confirm & Order
            </button>
        </div>
    </div>

    <div class="fixed bottom-6 left-6 right-6 glass rounded-[32px] px-8 py-5 flex justify-between shadow-2xl max-w-md mx-auto">
        <i class="fa-solid fa-bolt text-cyan-400 text-xl"></i>
        <i class="fa-solid fa-clock text-slate-600 text-xl"></i>
        <i class="fa-solid fa-wallet text-slate-600 text-xl"></i>
        <i class="fa-solid fa-user text-slate-600 text-xl"></i>
    </div>

</body>
</html>
