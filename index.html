<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIIEPRO | SMM Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .custom-scroll::-webkit-scrollbar { width: 0px; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        body { background-color: #050505; color: #e2e8f0; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const App = () => {
            // --- CORE STATES ---
            const [page, setPage] = useState('auth'); 
            const [authMode, setAuthMode] = useState('login');
            const [tab, setTab] = useState('new-order');
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(false);
            const [searchTerm, setSearchTerm] = useState("");

            // --- DATABASE ---
            const [users, setUsers] = useState([
                { id: 1, username: 'admin_viie', email: 'admin@viie.com', password: 'admin123', balance: 100000, role: 'admin' },
                { id: 2, username: 'customer_pro', email: 'user@test.com', password: 'user123', balance: 1500, role: 'user' }
            ]);

            const [services] = useState([
                { id: 101, category: 'followers', name: "IG Followers [Stable]", rate: 85, info: "Speed: 10k/day | Start: 0-1h" },
                { id: 102, category: 'followers', name: "IG Followers [Non-Drop]", rate: 110, info: "Lifetime Refill | Instant" },
                { id: 201, category: 'likes', name: "IG Real Likes [HQ]", rate: 25, info: "Instant | Real Accounts" },
                { id: 301, category: 'views', name: "Reels Views [Viral Boost]", rate: 4.5, info: "Explore Hit | 1M/day" }
            ]);

            const [orders, setOrders] = useState([
                { id: 84512, service: "IG Followers Stable", link: "instagram.com/viie", qty: 1000, cost: 85, status: 'Completed', user: 'customer_pro', date: "2024-03-12" }
            ]);

            // --- AUTH LOGIC ---
            const handleAuth = (e) => {
                e.preventDefault();
                setLoading(true);
                const email = e.target.email.value;
                const pass = e.target.password.value;

                setTimeout(() => {
                    if (authMode === 'login') {
                        const foundUser = users.find(u => u.email === email && u.password === pass);
                        if (foundUser) { setUser(foundUser); setPage('dashboard'); } 
                        else { alert("Email ya password galat hai!"); }
                    } else {
                        const username = e.target.username.value;
                        setUsers([...users, { id: users.length + 1, username, email, password: pass, balance: 0, role: 'user' }]);
                        alert("Account taiyar hai! Login karein.");
                        setAuthMode('login');
                    }
                    setLoading(false);
                }, 800);
            };

            // --- ORDER LOGIC ---
            const [selectedCat, setSelectedCat] = useState('');
            const [selectedSer, setSelectedSer] = useState(null);
            const [orderQty, setOrderQty] = useState(0);

            const totalBill = useMemo(() => {
                if (!selectedSer || !orderQty) return 0;
                return (selectedSer.rate / 1000) * orderQty;
            }, [selectedSer, orderQty]);

            const handleNewOrder = (e) => {
                e.preventDefault();
                if (!selectedSer) return alert("Pehle service select karein!");
                if (user.balance < totalBill) return alert("Balance kam hai bhai!");

                setLoading(true);
                setTimeout(() => {
                    const newOrder = {
                        id: Math.floor(Math.random() * 90000) + 10000,
                        service: selectedSer.name,
                        link: e.target.link.value,
                        qty: orderQty, cost: totalBill, status: 'Pending', user: user.username, date: new Date().toISOString().split('T')[0]
                    };
                    setOrders([newOrder, ...orders]);
                    const updatedUser = { ...user, balance: user.balance - totalBill };
                    setUser(updatedUser);
                    setUsers(users.map(u => u.id === user.id ? updatedUser : u));
                    setLoading(false);
                    alert("Order successfully place ho gaya!");
                    e.target.reset();
                }, 1000);
            };

            const filteredOrders = useMemo(() => {
                const list = user?.role === 'admin' ? orders : orders.filter(o => o.user === user?.username);
                if (!searchTerm) return list;
                return list.filter(o => o.id.toString().includes(searchTerm) || o.service.toLowerCase().includes(searchTerm.toLowerCase()));
            }, [orders, user, searchTerm]);

            if (page === 'auth') return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-black">
                    <div className="w-full max-w-md bg-white/5 backdrop-blur-3xl border border-white/10 p-10 rounded-[40px] shadow-2xl fade-in">
                        <div className="text-center mb-10">
                            <h1 className="text-4xl font-black italic text-white uppercase tracking-tighter">VIIE<span className="text-cyan-400">PRO</span></h1>
                            <p className="text-slate-500 text-[10px] mt-2 uppercase font-black tracking-widest">{authMode === 'login' ? 'Authentication' : 'Registration'}</p>
                        </div>
                        <form onSubmit={handleAuth} className="space-y-5">
                            {authMode === 'signup' && <input name="username" required className="w-full bg-black/50 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-cyan-400" placeholder="Username" />}
                            <input type="email" name="email" required className="w-full bg-black/50 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-cyan-400" placeholder="Email" />
                            <input type="password" name="password" required className="w-full bg-black/50 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-cyan-400" placeholder="Password" />
                            <button className="w-full bg-gradient-to-r from-cyan-400 to-blue-600 py-4 rounded-2xl text-black font-black uppercase tracking-widest shadow-lg active:scale-95 transition">
                                {loading ? 'Working...' : (authMode === 'login' ? 'Sign In' : 'Create Account')}
                            </button>
                        </form>
                        <button onClick={() => setAuthMode(authMode === 'login' ? 'signup' : 'login')} className="w-full mt-6 text-slate-500 text-[10px] font-black uppercase tracking-widest hover:text-cyan-400">
                            {authMode === 'login' ? "New User? Signup" : "Member? Login"}
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col lg:flex-row">
                    {/* PC SIDEBAR */}
                    <aside className="hidden lg:flex flex-col w-72 bg-[#080808] border-r border-white/5 p-8 h-screen sticky top-0">
                        <h1 className="text-3xl font-black italic text-white tracking-tighter uppercase mb-12 text-center">VIIE<span className="text-cyan-400">PRO</span></h1>
                        <nav className="space-y-2 flex-1">
                            <button onClick={() => setTab('new-order')} className={`w-full p-4 rounded-2xl text-left flex items-center gap-4 ${tab === 'new-order' ? 'bg-cyan-400 text-black font-black' : 'text-slate-500'}`}><i className="fas fa-bolt"></i> NEW ORDER</button>
                            <button onClick={() => setTab('orders')} className={`w-full p-4 rounded-2xl text-left flex items-center gap-4 ${tab === 'orders' ? 'bg-cyan-400 text-black font-black' : 'text-slate-500'}`}><i className="fas fa-clock"></i> HISTORY</button>
                            <button onClick={() => setTab('services')} className={`w-full p-4 rounded-2xl text-left flex items-center gap-4 ${tab === 'services' ? 'bg-cyan-400 text-black font-black' : 'text-slate-500'}`}><i className="fas fa-list"></i> SERVICES</button>
                        </nav>
                        <button onClick={() => setPage('auth')} className="text-red-500 font-black p-4"><i className="fas fa-sign-out-alt"></i> LOGOUT</button>
                    </aside>

                    {/* MAIN VIEWPORT */}
                    <main className="flex-1 p-4 lg:p-12 pb-32 overflow-y-auto custom-scroll">
                        <div className="flex flex-col md:flex-row justify-between items-center mb-10 gap-6 max-w-4xl mx-auto">
                           <div>
                              <h2 className="text-3xl font-black text-white uppercase tracking-tighter">{tab.replace('-', ' ')}</h2>
                              <p className="text-slate-500 text-[10px] uppercase font-black tracking-widest">Hello, {user.username}</p>
                           </div>
                           <div className="bg-white/5 border border-white/5 p-5 rounded-[2.5rem] flex items-center gap-5 shadow-2xl min-w-[280px]">
                              <div className="bg-cyan-400/10 p-4 rounded-2xl text-cyan-400"><i className="fas fa-wallet text-xl"></i></div>
                              <div>
                                 <p className="text-[9px] text-slate-500 uppercase font-black tracking-widest">Your Funds</p>
                                 <h3 className="text-2xl font-black text-white tracking-tighter">₹{user.balance.toLocaleString('en-IN', { minimumFractionDigits: 2 })}</h3>
                              </div>
                           </div>
                        </div>

                        <div className="bg-white/5 border border-white/10 rounded-[40px] p-6 lg:p-12 shadow-2xl max-w-4xl mx-auto min-h-[500px] fade-in">
                            {tab === 'new-order' && (
                                <form onSubmit={handleNewOrder} className="space-y-6">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-500 uppercase">Category</label>
                                            <select className="w-full bg-black/50 border border-white/10 p-4 rounded-2xl outline-none focus:border-cyan-400 text-sm" onChange={(e) => {setSelectedCat(e.target.value); setSelectedSer(null);}}>
                                                <option value="">Select Category</option>
                                                <option value="followers">Instagram Followers</option>
                                                <option value="likes">Instagram Likes</option>
                                                <option value="views">Instagram Views</option>
                                            </select>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-500 uppercase">Service</label>
                                            <select className="w-full bg-black/50 border border-white/10 p-4 rounded-2xl outline-none focus:border-cyan-400 text-sm" onChange={(e) => setSelectedSer(services.find(s => s.id == e.target.value))}>
                                                <option value="">Select Package</option>
                                                {selectedCat && services.filter(s => s.category === selectedCat).map(s => <option key={s.id} value={s.id}>{s.name} (₹{s.rate}/1k)</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    {selectedSer && <p className="text-xs text-cyan-400 italic"><b>Info:</b> {selectedSer.info}</p>}
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-500 uppercase">Instagram URL</label>
                                        <input name="link" required className="w-full bg-black/50 border border-white/10 p-4 rounded-2xl outline-none focus:border-cyan-400 text-sm" placeholder="https://..." />
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-500 uppercase">Quantity</label>
                                            <input type="number" required className="w-full bg-black/50 border border-white/10 p-4 rounded-2xl outline-none focus:border-cyan-400 text-sm" onChange={(e) => setOrderQty(parseInt(e.target.value) || 0)} />
                                        </div>
                                        <div className="bg-cyan-400/10 border border-cyan-400/20 p-4 rounded-2xl text-center">
                                            <p className="text-[9px] font-black text-cyan-400 uppercase">Bill Amount</p>
                                            <h3 className="text-2xl font-black text-white">₹{totalBill.toFixed(2)}</h3>
                                        </div>
                                    </div>
                                    <button className="w-full bg-gradient-to-r from-cyan-400 to-blue-600 py-5 rounded-3xl text-black font-black uppercase tracking-widest shadow-xl active:scale-95 transition">Confirm Order</button>
                                </form>
                            )}

                            {tab === 'orders' && (
                                <div className="space-y-6">
                                    <input type="text" placeholder="Search orders..." className="w-full bg-black/50 border border-white/10 p-4 rounded-2xl outline-none text-xs" onChange={(e) => setSearchTerm(e.target.value)} />
                                    <div className="overflow-x-auto custom-scroll">
                                        <table className="w-full text-left min-w-[600px]">
                                            <thead className="text-[10px] font-black text-slate-600 uppercase border-b border-white/5">
                                                <tr><th className="pb-4">ID</th><th className="pb-4">Service</th><th className="pb-4">Qty</th><th className="pb-4">Status</th><th className="pb-4 text-right">Cost</th></tr>
                                            </thead>
                                            <tbody>
                                                {filteredOrders.map(o => (
                                                    <tr key={o.id} className="border-b border-white/5 text-[11px] group">
                                                        <td className="py-4 font-black text-slate-500">#{o.id}</td>
                                                        <td className="py-4 font-bold text-white group-hover:text-cyan-400">{o.service}</td>
                                                        <td className="py-4 font-bold">{o.qty}</td>
                                                        <td className="py-4"><span className="bg-yellow-500/10 text-yellow-500 px-2 py-1 rounded-full text-[8px] font-black">{o.status}</span></td>
                                                        <td className="py-4 text-right font-black text-cyan-400">₹{o.cost.toFixed(2)}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {tab === 'services' && (
                                <div className="grid grid-cols-1 gap-4">
                                    {services.map(s => (
                                        <div key={s.id} className="bg-black/40 border border-white/5 p-5 rounded-3xl flex justify-between items-center border-l-4 border-l-cyan-400">
                                            <div><h4 className="font-black text-sm">{s.name}</h4><p className="text-[10px] text-slate-500">{s.info}</p></div>
                                            <div className="text-right font-black text-cyan-400">₹{s.rate}/1k</div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </main>

                    {/* MOBILE NAV */}
                    <nav className="lg:hidden fixed bottom-6 left-6 right-6 bg-[#111]/90 backdrop-blur-xl border border-white/10 rounded-[32px] px-8 py-5 flex justify-between shadow-2xl z-[50]">
                        <button onClick={() => setTab('new-order')} className={tab === 'new-order' ? 'text-cyan-400' : 'text-slate-600'}><i className="fas fa-bolt text-xl"></i></button>
                        <button onClick={() => setTab('orders')} className={tab === 'orders' ? 'text-cyan-400' : 'text-slate-600'}><i className="fas fa-clock text-xl"></i></button>
                        <button onClick={() => setTab('services')} className={tab === 'services' ? 'text-cyan-400' : 'text-slate-600'}><i className="fas fa-list text-xl"></i></button>
                        <button onClick={() => setPage('auth')} className="text-red-500"><i className="fas fa-sign-out-alt text-xl"></i></button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
